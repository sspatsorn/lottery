services:
  - type: web
    name: frontend-lottery
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: 0.0.0.0
      - key: GEMINI_API_KEY
        sync: false
